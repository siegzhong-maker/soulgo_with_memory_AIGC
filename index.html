    }

    const petAnimationStates = {
        idle_wait: makeFrames('等待', 'flog_dengdai', 6),
        idle_breath: makeFrames('呼吸', 'frog_idle', 6),
        idle_observe: makeFrames('观察', 'flog_guancha', 6),
        interact: makeFrames('互动', 'flog_hudong', 6),
        rest: makeFrames('休息', 'flog_xiuxi', 6),
        eat: makeFrames('互动', 'flog_hudong', 6),
        door: makeFrames('互动', 'flog_hudong', 6),
        plant: makeFrames('呼吸', 'frog_idle', 6)
    };

    const petAnimation = {
        currentState: 'idle_breath',
        index: 0,
        timer: null
    };

    function playPetAnimation(stateKey, options = {}) {
        if (!petAvatarSprite) return;

        const frames = petAnimationStates[stateKey] && petAnimationStates[stateKey].length
            ? petAnimationStates[stateKey]
            : petAnimationStates.idle_breath;

        if (!frames || !frames.length) return;

        const loop = options.loop !== undefined ? options.loop : stateKey === 'idle_breath';
        const pConfig = getCurrentPersonality();
        // 根据人格能量值调整基础帧率：外向(0.8)快，内向(1.5)慢
        const baseInterval = stateKey === 'idle_breath' ? 800 : 200;
        const speedMultiplier = pConfig.animSpeed || 1.0;
        const frameInterval = options.frameInterval || Math.floor(baseInterval * speedMultiplier);
        
        const maxCycles = options.cycles || 2;

        // 切换图片帧
        clearInterval(petAnimation.timer);
        petAnimation.currentState = stateKey;
        petAnimation.index = 0;
        petAvatarSprite.src = frames[0];

        let played = 0;
        petAnimation.timer = setInterval(() => {
            petAnimation.index = (petAnimation.index + 1) % frames.length;
            petAvatarSprite.src = frames[petAnimation.index];

            if (!loop) {
                played++;
                if (played >= frames.length * maxCycles) {
                    clearInterval(petAnimation.timer);
                    if (stateKey !== 'idle_breath') {
                        playPetAnimation('idle_breath', { loop: true, frameInterval: 800 });
                    }
                }
            }
        }, frameInterval);

        // 切换对应的身体动效 class
        const stateClassMap = {
            idle_wait: 'pet-anim-idle',
            idle_breath: 'pet-anim-idle',
            idle_observe: 'pet-anim-idle',
            interact: 'pet-anim-excited',
            rest: 'pet-anim-sleep',
            eat: 'pet-anim-eat',
            door: 'pet-anim-door',
            plant: 'pet-anim-plant'
        };

        Object.values(stateClassMap).forEach(cls => {
            petAvatarSprite.classList.remove(cls);
        });
        const cls = stateClassMap[stateKey] || stateClassMap.idle_breath;
        if (cls) {
            petAvatarSprite.classList.add(cls);
        }
    }

    function startIdleAnimation() {
        playPetAnimation('idle_breath', { loop: true, frameInterval: 800 });
    }

    function playExcitedAnimation() {
        setPetState(PET_STATES.INTERACT);
    }

    // --- 调用 OpenRouter 生成 AIGC 日记文案 ---
    async function generateDiaryWithAIGC(location, personality) {
        const normalized = normalizeLocationName(location);
        const flavor = cityFlavorMap[normalized];
        const visitIndex = appState.locations.length;
        const date = new Date().toLocaleDateString('zh-CN').replace(/\//g, '-');
        
        // Add time of day
        const hour = new Date().getHours();
        let timeOfDay = '白天';
        if (hour < 6) timeOfDay = '凌晨';
        else if (hour < 9) timeOfDay = '清晨';
        else if (hour < 12) timeOfDay = '上午';
        else if (hour < 14) timeOfDay = '中午';
        else if (hour < 18) timeOfDay = '午后';
        else if (hour < 21) timeOfDay = '傍晚';
        else timeOfDay = '深夜';

        const flavorText = flavor
            ? `\n- 当地氛围关键词：${flavor.tone}。\n- 推荐提及的打卡点（选1-2个）：${flavor.highlights.join('、')}。`
            : '';
        const progressText = visitIndex > 1
            ? `这是我们第 ${visitIndex} 次一起旅行。`
            : '这是我们的第一次真正出发。';

        const pConfig = PERSONALITY_TYPES[personality];
        const promptDesc = pConfig ? pConfig.promptDesc : '热情、可爱、治愈。';
        const ownerTitle = getOwnerTitle();

        // 从记忆系统注入：人格设定 + 情境 recall 的旅行记忆（供 LLM 体现「记得」）
        const semanticProfile = typeof getSemanticProfileForDisplay === 'function' ? getSemanticProfileForDisplay() : null;
        const relevantMemories = typeof recallRelevantMemories === 'function'
            ? recallRelevantMemories({ location, time_slot: typeof getCurrentTimeSlot === 'function' ? getCurrentTimeSlot() : '', includeDaily: false, limit: 2 })
            : [];
        const memoryBlock = [];
        if (semanticProfile && semanticProfile.identity) memoryBlock.push('人格设定：' + semanticProfile.identity);
        if (semanticProfile && semanticProfile.speaking_style && semanticProfile.speaking_style.description) memoryBlock.push('说话风格：' + semanticProfile.speaking_style.description);
        relevantMemories.forEach((m) => {
            const dateStr = m.date || '';
            const cityLabel = m.location_city || m.location || '';
            const timeLabel = typeof formatTimeSlotLabel === 'function' ? formatTimeSlotLabel(m.time_slot) : '';
            const summary = m.summary || m.narration || m.text || '';
            const sourceLabel = typeof getMemorySourceLabel === 'function' ? getMemorySourceLabel(m) : '';
            const prefix = [dateStr, cityLabel, timeLabel].filter(Boolean).join(' ');
            const line = prefix ? `${prefix} —— ${summary}` : summary;
            const withSource = sourceLabel ? `[${sourceLabel}] ${line}` : line;
            if (line) memoryBlock.push('旅行记忆：' + withSource);
        });
        const memoryText = memoryBlock.length > 0 ? '\n【宠物记忆（可参考以体现连贯）】\n' + memoryBlock.join('\n') : '';

        // 根据性格控制篇幅长短
        let lengthHint = '4. **篇幅**：80-150字左右，短小精悍，治愈风格。';
        if (pConfig && pConfig.wordiness === 'chatter') {
            lengthHint = '4. **篇幅**：120-200字左右，可以稍微多一些，用细节把画面讲清楚。';
        } else if (pConfig && pConfig.wordiness === 'quiet') {
            lengthHint = '4. **篇幅**：60-100字左右，语句可以更简短克制。';
        }

        const prompt = [
            `你是一只电子宠物玩偶（比卡丘），正在用第一人称“我”写一篇旅行日记，记录和${ownerTitle}一起旅行的一个小瞬间。`,
            `\n【当前情境】`,
            `- 地点：${location}${flavorText}`,
            `- 时间：${date} ${timeOfDay}`,
            `- 我对陪我旅行的人称呼：${ownerTitle}（不要使用“主人”一词）。`,
            `- 你的性格：${personality}`,
            `- 性格描述：${promptDesc}`,
            memoryText,
            `\n【写作要求】`,
            `1. **颗粒度要细**：不要写宏大的流水账。请着重描写**一个具体的瞬间**或**一个微小的细节**。`,
            `2. **调动感官**：必须包含至少一种**视觉、听觉或嗅觉**的描写。`,
            `3. **情感连接**：表达对${ownerTitle}的陪伴和一起旅行的快乐，但不要直接对${ownerTitle}说话。`,
            lengthHint,
            `5. **格式**：只输出日记正文，不要标题，不要markdown格式。`,
            `6. **叙述角度**：全文保持第一人称“我”的日记语气，像写给自己看的记录，不要像聊天或写信，不要频繁用“你”直接和读者说话。`,
            relevantMemories.length > 0 ? `7. **记忆呼应**：上方【宠物记忆】中若有旅行记忆，可在合适处自然提一句与过往旅行或记忆的关联（例如对比、延续、呼应），让读者感受到“记得”；不必每篇都强求，有机会就体现。` : ''
        ].filter(Boolean).join('\n');

        const body = {
            model: OPENROUTER_MODEL_ID,
            messages: [
                {
                    role: 'system',
                    content: '你是一只可爱、治愈系的电子宠物，用第一人称“我”写旅行日记。整体语气可爱、治愈，像陪伴型电子宠物，短句为主，避免过于书面或成熟。语言轻松、有画面感，避免负面情绪和不当内容。不要出现“主人”一词，尽量少用“你”直接和读者对话。'
                },
                {
                    role: 'user',
                    content: prompt
                }
            ]
        };

        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 8000);

        try {
            const response = await fetch(AIGC_API_ENDPOINT, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(body),
                signal: controller.signal
            });

            if (!response.ok) {
                return { ok: false, error: `http_${response.status}` };
            }

            const data = await response.json();
            const content = data && data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content;

            if (!content || typeof content !== 'string') {
                return { ok: false, error: 'empty_content' };
            }

            const travelMemoryCount = relevantMemories.length;
            return { ok: true, content: content.trim(), memoryCount: travelMemoryCount };
        } catch (error) {
            if (error.name === 'AbortError') {
                return { ok: false, error: 'timeout' };
            }
            console.error('[Diary AIGC] OpenRouter 请求异常:', error.message || error);
            return { ok: false, error: 'network' };
        } finally {
            clearTimeout(timeoutId);
        }
    }

    function buildDiaryText(location, personality) {
        const normalized = normalizeLocationName(location);
        const flavor = cityFlavorMap[normalized];
        const visitIndex = appState.locations.length;
        const progressText = visitIndex > 1 ? `这是我们的第${visitIndex}次旅行打卡。` : '这是我们的第一次真正出发。';
        const ownerTitle = getOwnerTitle();

        const pick = (arr) => arr[Math.floor(Math.random() * arr.length)];
        const spots = (flavor && flavor.highlights) || [];
        const h1 = spots.length ? pick(spots) : '';
        const h2 = spots.length > 1 ? pick(spots.filter((s) => s !== h1)) : '';

        // 根据 2x2 人格 + 城市风格组合生成文案
        if (personality === '小火苗') {
            if (flavor) {
                return `耶！今天我们解锁了【${location}】！在${h1}${h2 ? `，又蹦蹦跳跳跑到${h2}` : ''}，笑声把相机都晃糊啦。${progressText}`;
            }
            return `耶！今天来到【${location}】啦！一路小跑到处张望，整座城市都在跟我们打招呼～${progressText}`;
        }

        if (personality === '小灯泡') {
            if (flavor) {
                return `抵达【${location}】啦！在${h1}${h2 ? `，又顺路看了下${h2}` : ''}，一路偷偷记这里的设计～${progressText}`;

        }

        if (personality === '小云朵') {
            if (flavor) {
                return `风轻轻吹过【${location}】的街道，我在${h1}${h2 ? `，又在${h2}` : ''}停下脚步，把光和云都藏进心里啦。${progressText}`;

        // 小石头及其他：更克制、冷静
        if (flavor) {
            return `【${location}】还挺安静的。在${h1}${h2 ? `，顺便看了看${h2}` : ''}，把今天的记忆稳稳存好啦。${progressText}`;
        }
        return `今天把脚步落在【${location}】啦。没什么夸张的场面，一路走一路记，记忆卡又多了一页～${progressText}`;
    }

    // --- AIGC 生图逻辑 ---
    async function generateImageForDiary(diaryId, location, personality, diarySummary) {
        // 列表与弹窗可能各有一份该日记的 DOM，需同时更新
        const containers = document.querySelectorAll('.diary-aigc-image[data-diary-id="' + diaryId + '"]');
        if (!containers.length) return;

        const applyToAll = (html) => {
            containers.forEach((el) => {
                el.classList.remove('hidden');
                el.innerHTML = html;
            });
        };

        // 1. Show Loading State
        applyToAll(`
            <div class="flex flex-col items-center justify-center p-4 text-gray-400">
                <div class="w-8 h-8 border-2 border-[#ff8fab] border-t-transparent rounded-full animate-spin mb-2"></div>
                <span class="text-xs">皮卡丘正在绘图中...</span>
            </div>
        `);

        // 2. Build Prompt
        // 简单提取摘要，取前30个字
        const safeSummary = (diarySummary || '').slice(0, 50).replace(/\n/g, ' ');
        const weather = 'sunny day'; // 暂时默认为晴天，或者后续接入真实天气
        
        // 风格关键词
        let styleKeywords = 'cute, healing style, soft lighting, digital art, high quality, detailed';
        if (personality === '小火苗') styleKeywords += ', energetic, vibrant colors';
        else if (personality === '小云朵') styleKeywords += ', dreamy, pastel colors, soft focus';
        else if (personality === '小灯泡') styleKeywords += ', bright, clear, curious atmosphere';

        const prompt = `A cute Pikachu in ${location}, ${weather}, doing: ${safeSummary}. Art style: ${styleKeywords}.`;

        try {
            // 3. Call API
            const res = await fetch('/api/generate-image', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt })
            });

            if (!res.ok) {
                const errBody = await res.json().catch(() => ({}));
                const apiMessage = errBody.message || errBody.error || `HTTP ${res.status}`;
                console.error('[AIGC Image] API error:', res.status, errBody);
                throw new Error(apiMessage);
            }

            const data = await res.json();
            if (!data.image_url) throw new Error('No image url returned');

            // 4. Update UI：图片 + 导出按钮（列表与弹窗同时更新）
            const safeLoc = (location || '').replace(/"/g, '&quot;');
            const successHTML = `
                <div class="relative group">
                    <img src="${data.image_url.replace(/"/g, '&quot;')}" alt="AIGC Generated" class="w-full h-auto object-cover animate-[fadeIn_0.5s_ease-out]">
                    <button type="button" class="js-export-diary-image absolute bottom-2 right-2 px-2 py-1 rounded-lg bg-black/60 text-white text-[11px] hover:bg-black/80 transition-colors flex items-center gap-1"
                        data-diary-id="${diaryId}" data-location="${safeLoc}" title="导出到本地">
                        <i class="ph-fill ph-download-simple"></i>
                        <span>导出图片</span>
                    </button>
                </div>
            `;
            applyToAll(successHTML);

            // Save to appState only when URL is not base64 (data URLs blow localStorage quota)
            if (!data.image_url.startsWith('data:')) {
                if (!appState.diaryImages) appState.diaryImages = {};
                if (!appState.diaryImages[diaryId]) appState.diaryImages[diaryId] = [];
                if (!appState.diaryImages[diaryId].includes(data.image_url)) {
                    appState.diaryImages[diaryId].push(data.image_url);
                    saveState();
                }
            }

        } catch (e) {
            console.error('Image Generation Failed:', e);
            const shortReason = e.message && e.message.length < 60 ? e.message : '绘图失败';
            const errorHTML = `
                <div class="flex flex-col items-center justify-center p-4 text-gray-400 cursor-pointer hover:text-gray-600 transition-colors" onclick="this.parentElement.classList.add('hidden')" title="${(e.message || '').replace(/"/g, '&quot;')}">
                    <i class="ph-fill ph-warning-circle text-xl mb-1"></i>
                    <span class="text-xs">${shortReason} (点击隐藏)</span>
                </div>
            `;
            applyToAll(errorHTML);
        }
    }

    function getCurrentTimeSlot() {
        const hour = new Date().getHours();
        if (hour >= 5 && hour < 12) return 'morning';
        if (hour >= 12 && hour < 18) return 'afternoon';
        if (hour >= 18 && hour < 23) return 'evening';
        return 'night';
    }

    function formatTimeSlotLabel(timeSlot) {
        const map = {
            morning: '早上',
            afternoon: '下午',
            evening: '晚上',
            night: '深夜'
        };
        return map[timeSlot] || '';
    }

    function getMemorySourceLabel(m) {
        if (!m) return '';
        if (m.source === 'nfc' && m.nfc_source) {
            const src = m.nfc_source;
            if (PRESET_NFC_SOURCES.merchants.includes(src)) return 'NFC-商家·' + src;
            if (PRESET_NFC_SOURCES.dolls.includes(src)) return 'NFC-玩偶·' + src;
            return 'NFC-' + src;
        }
        if (m.source === 'checkin' && (m.location_city || m.location)) return '打卡-' + (m.location_city || m.location);
        if (m.source === 'interaction') return '互动-' + (formatTimeSlotLabel(m.time_slot) || '');
        return m.source || '打卡';
    }

    function buildEpisodicSummary({ city, spot, timeSlot, personalityKey }) {
        const timeLabel = formatTimeSlotLabel(timeSlot);
        const placeText = spot ? `${city}的${spot}` : city;

        let emotion = 'calm';
        let summary = '';

        const p = personalityKey || appState.petPersonality || '小火苗';

        if (p === '小火苗') {
            emotion = 'excited';
            summary = `${timeLabel}在${placeText}一路蹦蹦跳跳，差点把照片都晃糊了。`;
        } else if (p === '小云朵') {
            emotion = 'tender';
            summary = `${timeLabel}在${placeText}慢慢走慢慢看，把安静的风景都藏进心里。`;
        } else if (p === '小灯泡') {
            emotion = 'curious';
            summary = `${timeLabel}在${placeText}到处张望，记下好多细节准备回去慢慢研究。`;
        } else {
            emotion = 'nostalgic';
            summary = `${timeLabel}在${placeText}走得不快不慢，像是给这条路盖了一个小小的纪念章。`;
        }

        return { summary, emotion };
    }

    // --- 宠物记忆：数据与渲染 ---
    /**
     * 记忆机制说明（appState.memories）：
     * - 触发：
     *   - 打卡成功后，为本次日记写入一条旅行情景记忆（travel，episodic）；
     *   - 首次打开记忆页时，ensureMemorySeeds 写入示例旅行/日常/习惯记忆作为种子。
     * - 内容：
     *   - episodic.travel：date/location_city/location_spot/time_slot/personality/summary/emotion/diaryId/scene 等；
     *   - summary 优先来自 /api/memory-summary 的 LLM 抽取；当接口超时或解析失败时，回退到 buildEpisodicSummary 模板生成。
     * - 用途：
     *   - generateDiaryWithAIGC 在写日记时注入与当前地点相关的旅行记忆（【宠物记忆】）；
     *   - getPetBubbleText 随机抽取旅行/日常记忆作为宠物房间气泡文案；
     *   - 记忆页 renderMemories / openMemoryEditForm 展示与编辑 episodic、semanticProfile 与 habit。
     */
    // 支持可选 summary/emotion/key_facts/source/nfc_source：若由 LLM 记忆抽取接口返回则传入，否则用 buildEpisodicSummary 模板
    function appendEpisodicMemory({ date, location, scene, diaryId, summary: givenSummary, emotion: givenEmotion, key_facts: givenKeyFacts, source: givenSource, nfc_source: givenNfcSource }) {
        if (!appState.memories) {
            appState.memories = { episodic: [], semantic: [], semanticProfile: null, habit: [] };
        }
        const normalized = normalizeLocationName(location);
        const flavor = cityFlavorMap[normalized];
        const city = normalized || location || '未知地点';
        const timeSlot = getCurrentTimeSlot();
        const personalityKey = appState.petPersonality || '小火苗';

        // 记忆地点只锚定用户输入：仅用同城 flavor 高亮点，不用随机掉落的 scene.label（避免「潮州打卡却记成广州」）
        const spot = (flavor && flavor.highlights && flavor.highlights.length) ? flavor.highlights[0] : '';

        const summaryInfo = (givenSummary && givenEmotion)
            ? { summary: givenSummary, emotion: givenEmotion }
            : buildEpisodicSummary({ city, spot, timeSlot, personalityKey });
        const summary = summaryInfo.summary;
        const emotion = summaryInfo.emotion;

        // importance: 首次打卡该城市 + 高情绪(excited/nostalgic) 更高
        const visitCount = (appState.locations || []).filter((l) => (l || '').indexOf(city) >= 0 || (city || '').indexOf(l || '') >= 0).length;
        const isFirstVisit = visitCount <= 1;
        const highEmotion = emotion === 'excited' || emotion === 'nostalgic';
        const importance = Math.min(1, Math.max(0, 0.5 + (isFirstVisit ? 0.2 : 0) + (highEmotion ? 0.2 : (emotion === 'tender' || emotion === 'curious' ? 0.1 : 0))));

        const now = new Date();
        const record = {
            type: 'episodic',
            category: 'travel',
            date,
            location,
            location_city: city,
            location_spot: '打卡 ' + city,
            time_slot: timeSlot,
            personality: personalityKey,
            emotion,
            summary,
            diaryId: diaryId || null,
            scene: scene || null,
            scene_label: scene && scene.label ? scene.label : null,
            narration: summary,
            text: summary,
            strength: 0.9,
            last_recalled_at: null,
            recall_count: 0,
            key_facts: Array.isArray(givenKeyFacts) ? givenKeyFacts.slice(0, 4) : [],
            importance,
            source: givenSource || 'checkin',
            nfc_source: givenNfcSource || null,
            time_window: 'current'
        };

        appState.memories.episodic = appState.memories.episodic || [];
        appState.memories.episodic.unshift(record);
        if (appState.memories.episodic.length > 30) {
            appState.memories.episodic = appState.memories.episodic.slice(0, 30);
        }
        
        saveState();
    }

    /** 情景记忆·旅行：episodic 且 category 为 travel 或未定义（兼容旧数据） */
    function getEpisodicTravel() {
        const list = (appState.memories && appState.memories.episodic) ? appState.memories.episodic : [];
        return list.filter((m) => (m.category === 'travel' || m.category === undefined));
    }

    /** 衰减记忆强度：按日期/上次 recall 时间衰减，strength < 阈值视为淡忘 */
    function decayMemoryStrength() {
        const episodic = appState.memories && appState.memories.episodic;
        if (!episodic || episodic.length === 0) return;
        const now = Date.now();
        const oneWeek = 7 * 24 * 60 * 60 * 1000;
        episodic.forEach((m) => {
            const strength = typeof m.strength === 'number' ? m.strength : 0.9;
            let refTime = now;
            if (m.last_recalled_at) {
                const t = new Date(m.last_recalled_at).getTime();
                if (!isNaN(t)) refTime = t;
            } else if (m.date) {
                const t = new Date(String(m.date).replace(/-/g, '/')).getTime();
                if (!isNaN(t)) refTime = t;
            }
            const elapsedWeeks = Math.max(0, (now - refTime) / oneWeek);
            const decayed = strength * Math.pow(MEMORY_DECAY_PER_WEEK, Math.floor(elapsedWeeks));
            m.strength = Math.max(0, Math.min(1, decayed));
        });
    }

    /**
     * 情境触发 recall：按 recallScore 排序返回最相关的记忆
     * @param {Object} context - { location?, time_slot?, recent_locations?, limit?, includeDaily? }
     * @returns {Array} 排序后的记忆列表
     */
    function recallRelevantMemories(context) {
        decayMemoryStrength();
        const travel = getEpisodicTravel();
        const daily = (context?.includeDaily !== false) && (appState.memories && appState.memories.episodic)
            ? appState.memories.episodic.filter((m) => m.category === 'daily')
            : [];
        const all = travel.concat(daily);
        const limit = typeof context?.limit === 'number' ? context.limit : 3;
        const loc = (context?.location || '').trim();
        const timeSlot = context?.time_slot || (typeof getCurrentTimeSlot === 'function' ? getCurrentTimeSlot() : '');
        const recentLocs = context?.recent_locations || (appState.locations ? appState.locations.slice(-3) : []);
        const contextStr = [loc].concat(recentLocs).filter(Boolean).join(' ');

        const scored = all.map((m, idx) => {
            const strength = typeof m.strength === 'number' ? m.strength : 0.9;
            if (strength < MEMORY_STRENGTH_THRESHOLD) return { m, score: -1 };
            const importance = typeof m.importance === 'number' ? m.importance : 0.5;
            const recency = 1 - idx / Math.max(1, all.length);
            let relevance = 0;
            const cityLabel = (m.location_city || m.location || '').trim();
            if (loc && cityLabel && (cityLabel.indexOf(loc) >= 0 || loc.indexOf(cityLabel) >= 0)) relevance += 0.8;
            else if (recentLocs.some((r) => cityLabel && (cityLabel.indexOf(r) >= 0 || (r || '').indexOf(cityLabel) >= 0))) relevance += 0.5;
            if (timeSlot && m.time_slot === timeSlot) relevance += 0.2;
            const facts = m.key_facts || [];
            if (facts.some((f) => contextStr && contextStr.indexOf(f) >= 0)) relevance += 0.3;
            const score = 0.3 * recency + 0.4 * relevance + 0.2 * strength + 0.1 * importance;
            return { m, score };
        });

        return scored
            .filter((x) => x.score >= 0)
            .sort((a, b) => b.score - a.score)
            .slice(0, limit)
            .map((x) => x.m);
    }

    /** 更新记忆的 recall 状态（被气泡/日记使用时调用） */
    function markMemoryRecalled(memory) {
        if (!memory || !appState.memories || !appState.memories.episodic) return;
        const idx = appState.memories.episodic.indexOf(memory);
        if (idx < 0) return;
        const m = appState.memories.episodic[idx];
        m.last_recalled_at = new Date().toISOString();
        m.recall_count = (m.recall_count || 0) + 1;
        m.strength = Math.min(1, (m.strength ?? 0.9) + 0.05);
    }

    /** 情景记忆·日常：episodic 且 category 为 daily */
    function getEpisodicDaily() {
        const list = (appState.memories && appState.memories.episodic) ? appState.memories.episodic : [];
        return list.filter((m) => m.category === 'daily');
    }

        function getTimeWindow(m) {

                    <div class="text-xs text-gray-700 leading-relaxed">${escapeHtml(summary)}</div>
                    ${habitInf ? '<div class="text-[11px] text-gray-500 mt-1">' + escapeHtml(habitInf) + '</div>' : ''}

                </div>
            `;
        }

        const episodic = appState.memories.episodic || [];
        const travelCardsWithIndex = [];
        const dailyCardsWithIndex = [];
        episodic.forEach((m, i) => {
            if (m.category === 'daily') dailyCardsWithIndex.push({ m, i });
            else travelCardsWithIndex.push({ m, i });
        });
        const currentTravel = travelCardsWithIndex.filter(({ m }) => getTimeWindow(m) === 'current');
        const historyTravel = travelCardsWithIndex.filter(({ m }) => getTimeWindow(m) !== 'current');
        const currentDaily = dailyCardsWithIndex.filter(({ m }) => getTimeWindow(m) === 'current');
        const historyDaily = dailyCardsWithIndex.filter(({ m }) => getTimeWindow(m) !== 'current');
        const currentSection = currentTravel.length + currentDaily.length > 0
            ? '<div class="mb-3"><div class="text-[11px] font-bold text-gray-500 mb-2">当前记忆</div><div class="flex flex-col gap-2">' + currentTravel.map(({ m, i }) => makeEpisodicCard(m, false, i)).join('') + currentDaily.map(({ m, i }) => makeEpisodicCard(m, true, i)).join('') + '</div></div>'
            : '';
        const historySection = historyTravel.length + historyDaily.length > 0
            ? '<div><div class="text-[11px] font-bold text-gray-500 mb-2">历史记忆（本周/本月/本年）</div><div class="flex flex-col gap-2">' + historyTravel.map(({ m, i }) => makeEpisodicCard(m, false, i)).join('') + historyDaily.map(({ m, i }) => makeEpisodicCard(m, true, i)).join('') + '</div></div>'
            : '';
        const travelCardsHTML = currentMemoryTab === 'travel' && (travelCardsWithIndex.length > 0 || dailyCardsWithIndex.length > 0)
            ? '<div class="flex flex-col gap-0">' + currentSection + historySection + '</div>'
            : '';
        const travelEmptyHTML = (currentMemoryTab === 'travel' && travelCardsWithIndex.length === 0 && dailyCardsWithIndex.length === 0)
            ? '<p class="text-center text-xs text-gray-500 py-4">我还没有记下这类呢，带我去打卡一两个地方试试吧。</p>'
            : '';

        const identityBlock = (profile && (profile.identity || (profile.preferences && Object.keys(profile.preferences).length > 0))) ? `
            <div class="memory-card bg-white rounded-xl p-3 shadow-md border border-gray-100 text-left relative mb-2" data-memory-type="semanticProfile">
                <div class="absolute top-2 left-2 text-[#ff9a9e]"><i class="ph-fill ph-paperclip-tilt text-sm"></i></div>
                <button type="button" class="memory-edit-btn absolute top-2 right-2 text-[10px] text-gray-500 hover:text-[#ff8fab] px-1.5 py-0.5 rounded">编辑</button>
                <div class="text-[10px] text-gray-400 mb-1">人格设定</div>
                ${profile.identity ? '<div class="text-xs text-gray-700 mb-2">' + escapeHtml(profile.identity) + '</div>' : ''}
                ${(profile.preferences && (profile.preferences.food || profile.preferences.dislikes || profile.preferences.abilities)) ? '<div class="text-[11px] text-gray-600 space-y-1">' + (profile.preferences.food ? '<div>喜好：' + escapeHtml(profile.preferences.food) + '</div>' : '') + (profile.preferences.dislikes ? '<div>不喜欢：' + escapeHtml(profile.preferences.dislikes) + '</div>' : '') + (profile.preferences.abilities ? '<div>能力：' + escapeHtml(profile.preferences.abilities) + '</div>' : '') + '</div>' : ''}
                ${(profile.speaking_style && profile.speaking_style.description) ? '<div class="text-[11px] text-gray-500 mt-2">' + escapeHtml(profile.speaking_style.description) + '</div>' : ''}
                ${(profile.call_user && profile.call_user.length) ? '<div class="text-[10px] text-gray-400 mt-1">称呼你：' + escapeHtml(profile.call_user.join('、')) + '</div>' : ''}
            </div>
        ` : '';

        const habitCardsHTML = (currentMemoryTab === 'character' && habits.length > 0) ? habits.map((h, idx) =>

        ).join('') : '';

        const characterEmptyHTML = (currentMemoryTab === 'character' && !(profile && profile.identity) && habits.length === 0) ? '<p class="text-center text-xs text-gray-500 py-4">我还没有记下这类呢。</p>' : '';

        const travelPanelHTML = currentMemoryTab === 'travel' ? (travelCardsHTML || travelEmptyHTML) : '';
        const characterPanelHTML = currentMemoryTab === 'character' ? (identityBlock + habitCardsHTML + (characterEmptyHTML && !identityBlock && !habitCardsHTML ? characterEmptyHTML : '')) : '';

        const bodyHTML = '<div class="flex flex-col gap-0 text-xs memory-modal-content">' + tabBarHTML + '<div id="memory-tab-content" class="overflow-y-auto flex-1 min-h-0">' + travelPanelHTML + characterPanelHTML + '</div></div>';

        modalBody.innerHTML = bodyHTML;

        const tabTravel = document.getElementById('memory-tab-travel');
        const tabCharacter = document.getElementById('memory-tab-character');
        if (tabTravel) tabTravel.addEventListener('click', function () { currentMemoryTab = 'travel'; renderMemories(); });
        if (tabCharacter) tabCharacter.addEventListener('click', function () { currentMemoryTab = 'character'; renderMemories(); });

        modalBody.querySelectorAll('.memory-edit-btn').forEach((btn) => {

        });

        const byTier = groupCabinetByTier(list);
        const tierLabels = { S: 'S 级', A: 'A 级', B: 'B 级', C: 'C 级' };
        const tierCols = { S: 2, A: 3, B: 3, C: 4 };
        let html = '';
        ['S', 'A', 'B', 'C'].forEach((tier) => {
            const slots = CABINET_TIER_SLOTS[tier] || 4;
            const group = byTier[tier] || [];
            const tierClass = tier === 'S' ? 'bg-amber-400 text-amber-900' : tier === 'A' ? 'bg-purple-400 text-purple-900' : tier === 'B' ? 'bg-blue-300 text-blue-900' : 'bg-gray-300 text-gray-700';
            const cols = tierCols[tier] || 4;
            html += `<div><div class="text-[10px] font-bold text-[#5c4a3a] mb-1 flex items-center gap-1"><span class="px-1 py-0.5 rounded text-[9px] ${tierClass}">${tierLabels[tier]}</span></div><div class="grid gap-2" style="grid-template-columns: repeat(${cols}, 1fr);">`;
            for (let i = 0; i < slots; i++) {
                const { item, origIdx } = group[i] || {};
                if (item && (item.scene || item.location || item.type === 'furniture')) {
                    let imgHtml = '';
                    let fallbackHtml = '';
                    let fullLabel = '';
                    let shortLabel = '';
                    
                    if (item.type === 'furniture') {
                        fullLabel = item.name;
                        shortLabel = item.name;
                        imgHtml = `<img src="${item.image}" alt="${escapeHtml(fullLabel)}" class="w-12 h-12 rounded-xl object-cover border border-[#d4c4a8] shadow-sm">`;
                    } else {
                        const scene = item.scene;
                        const { short, full } = getShortLabel(item);
                        fullLabel = full;
                        shortLabel = short;
                        imgHtml = scene ? `<img src="${scene.image}" alt="${escapeHtml(fullLabel)}" class="w-12 h-12 rounded-xl object-cover border border-[#d4c4a8] shadow-sm" onerror="this.style.display='none';this.nextElementSibling&&this.nextElementSibling.classList.remove('hidden');">` : '';
                        fallbackHtml = scene ? `<span class="text-2xl hidden">🧳</span>` : `<span class="text-2xl">🧳</span>`;
                    }

                    html += `<div class="cabinet-slot relative cursor-pointer" data-cabinet-item="true" data-item-index="${origIdx}"><span class="absolute top-0 right-0 text-[9px] font-bold px-1 py-0.5 rounded ${tierClass}">${tier}</span><div class="cabinet-slot__media">${imgHtml}${fallbackHtml}</div><span class="font-bold w-full min-w-0 line-clamp-3 text-center" title="${escapeHtml(fullLabel)}">${escapeHtml(shortLabel)}</span></div>`;
                } else {
                    html += cabinetPlaceholderHTML;
                }
            }
            html += '</div></div>';
        });
        cabinetGrid.innerHTML = html;
    }

    function escapeHtml(s) {
        const div = document.createElement('div');
        div.textContent = s;
        return div.innerHTML;
    }

    /** 橱柜展示用：有 scene 用 scene.label；无 scene 时缩短 location（·前一段或前6字+省略号），完整名放 title */
    function getShortLabel(item) {
        const full = item.scene ? item.scene.label : (item.location || '');
        if (item.scene) return { short: full, full };
        if (!full) return { short: '', full: '' };
        const idx = full.indexOf('·');
        const short = idx >= 0 ? full.slice(0, idx).trim() : (full.length > 6 ? full.slice(0, 6) + '…' : full);
        return { short, full };
    }

    function findCabinetItem(scene, location) {
        if (!appState.cabinetItems || appState.cabinetItems.length === 0) return null;
        return appState.cabinetItems.find(item =>
            (scene && item.scene && item.scene.label === scene.label) ||
            (!scene && !item.scene && item.location === location)
        ) || null;
    }

    function addCabinetItem(location, sceneOverride, tierOverride, sourceOverride) {
        if (!cabinetGrid) return;
        const scene = sceneOverride !== undefined ? sceneOverride : getSceneAsset(location);
        if (!scene) return;
        appState.cabinetItems = appState.cabinetItems || [];
        if (appState.cabinetItems.length >= CABINET_SLOTS) return;

        const tier = tierOverride || (scene && scene.tier) || 'C';
        const source = sourceOverride || (scene && scene.source) || 'checkin';
        appState.cabinetItems.unshift({ location, scene, tier, source });
        renderCabinetGrid();
        renderMemoryWall(); // 同步更新墙面
        saveState();
    }

    // --- 辅助函数：地图页打卡预览（物品 + 日记，图片在「查看完整日记」中展示） ---
    function showCheckinPreview(location, options) {
        if (!scenePreview) return;
        const { scene, diaryMeta, diaryText } = options || {};
        const date = diaryMeta && diaryMeta.date ? diaryMeta.date : new Date().toLocaleDateString('zh-CN').replace(/\//g, '-');
        const safeDiaryText = (diaryText || '').trim();
        const diarySummary = safeDiaryText.length > 80 ? escapeHtml(safeDiaryText.slice(0, 80)) + '…' : escapeHtml(safeDiaryText);

        const itemBlock = scene ? `
            <div class="glass-card rounded-2xl p-3 flex items-center gap-3 animate-[fadeIn_0.4s_ease-out]">
                <img src="${scene.image}" alt="${escapeHtml(scene.label)}" class="w-16 h-16 rounded-xl object-cover border border-white shadow-sm">
                <div class="flex flex-col">
                    <span class="text-[10px] font-bold text-gray-500">解锁远行场景</span>
                    <span class="text-sm font-bold text-gray-800">${escapeHtml(scene.label)}</span>
                    <span class="text-[10px] text-gray-500 mt-1">已同步到旅行橱柜与旅行日记插图</span>
                </div>
            </div>
        ` : '';

        const diaryBlock = `
            <div class="glass-card rounded-2xl p-3 flex flex-col gap-2 animate-[fadeIn_0.4s_ease-out]">
                <div class="flex justify-between items-center">
                    <span class="text-xs font-bold text-white bg-[#cdb4db] px-2 py-1 rounded-md">${escapeHtml(date)}</span>
                    <span class="text-xs text-gray-500 font-bold"><i class="ph-fill ph-map-pin text-[#ff8fab]"></i> ${escapeHtml(location || '')}</span>
                </div>
                ${diarySummary ? `<p class="text-gray-700 text-sm leading-relaxed line-clamp-3">${diarySummary}</p>` : ''}
                <button type="button" class="text-[11px] text-[#ff8fab] font-bold hover:underline self-start" onclick="typeof openDiaryModal==='function'&&openDiaryModal()">查看完整日记</button>
            </div>
        `;

        const parts = [itemBlock, diaryBlock].filter(Boolean);
        scenePreview.innerHTML = parts.join('');
        scenePreview.classList.remove('hidden');
    }

    function initOwnerTitleControls() {
        if (!ownerTitleConfig) return;
        updateOwnerTitleDisplay();

        const optionButtons = ownerTitleConfig.querySelectorAll('.owner-title-option');
        optionButtons.forEach((btn) => {
            btn.addEventListener('click', () => {
                const raw = btn.getAttribute('data-title') || '';
                const title = sanitizeOwnerTitle(raw);
                appState.ownerTitle = title;
                updateOwnerTitleDisplay();
                if (ownerTitleInput) {
                    ownerTitleInput.value = '';
                }
            });
        });

        if (ownerTitleInput) {
            ownerTitleInput.addEventListener('change', () => {
                const title = sanitizeOwnerTitle(ownerTitleInput.value);
                appState.ownerTitle = title;
                updateOwnerTitleDisplay();
            });
        }

        if (btnMemory) {
            btnMemory.addEventListener('click', (event) => {
                event.preventDefault();
                openMemoryModal();
            });
        }
    }

    // --- 家具生成与摆放系统 ---
    
    // 触发家具制作流程
    async function triggerFurnitureCrafting(location, diaryText) {
        // 1. 显示制作遮罩与动画
        const overlay = document.getElementById('crafting-overlay');
        const progressBar = document.getElementById('crafting-progress');
        const hint = document.getElementById('crafting-hint');
        
        overlay.classList.remove('hidden');
        progressBar.style.width = '0%';
        hint.textContent = '正在分析旅行记忆碎片...';

        // 模拟进度条
        setTimeout(() => { progressBar.style.width = '30%'; }, 100);
        setTimeout(() => { 
            progressBar.style.width = '60%'; 
            hint.textContent = '正在构建纪念品模型...';
        }, 2000);

        try {
            // 2. 调用 API 生成家具
            const response = await fetch('/api/generate-furniture', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    location: location,
                    diary_excerpt: diaryText.slice(0, 200), // 截取前200字作为上下文
                    city: location.split('·')[0] || ''
                })
            });

            if (!response.ok) throw new Error('生成失败');
            const data = await response.json();

            // 进度条跑满
            progressBar.style.width = '100%';
            hint.textContent = '制作完成！';
            
            // 3. 延迟展示奖励（等待进度条动画）
            setTimeout(() => {
                overlay.classList.add('hidden');
                showRewardModal(data);
            }, 800);

        } catch (error) {
            console.error('Furniture gen failed:', error);
            overlay.classList.add('hidden');
            // 失败时不打断流程，静默失败或 Toast 提示
        }
    }

    // 展示获得物品弹窗
    let currentRewardItem = null;
    function showRewardModal(item) {
        const modal = document.getElementById('reward-modal');
        const panel = document.getElementById('reward-panel');
        const img = document.getElementById('reward-image');
        const name = document.getElementById('reward-name');

        currentRewardItem = {
            id: 'furniture_' + Date.now(),
            type: 'furniture',
            name: item.item_name || '神秘纪念品',
            image: item.image_url,
            source_location: item.source_location || '旅途',
            date: new Date().toLocaleDateString('zh-CN'),
            tier: 'B' // 默认品质
        };

        img.src = item.image_url;
        name.textContent = item.item_name || '神秘纪念品';
        
        modal.classList.remove('hidden');
        // 简单的进入动画
        setTimeout(() => {
            panel.classList.remove('scale-95', 'opacity-0');
            panel.classList.add('scale-100', 'opacity-100');
        }, 10);
    }

    // 绑定奖励弹窗按钮事件
    document.getElementById('btn-reward-close').addEventListener('click', () => {
        if (currentRewardItem) {
            addFurnitureToCabinet(currentRewardItem);
            // 提示 Toast: 已放入橱柜
        }
        closeRewardModal();
    });

    document.getElementById('btn-reward-place').addEventListener('click', () => {
        if (currentRewardItem) {
            addFurnitureToCabinet(currentRewardItem);
            placeFurnitureInRoom(currentRewardItem);
        }
        closeRewardModal();
    });

    function closeRewardModal() {
        const modal = document.getElementById('reward-modal');
        const panel = document.getElementById('reward-panel');
        panel.classList.remove('scale-100', 'opacity-100');
        panel.classList.add('scale-95', 'opacity-0');
        setTimeout(() => {
            modal.classList.add('hidden');
            currentRewardItem = null;
        }, 300);
    }

    // 添加家具到橱柜
    function addFurnitureToCabinet(item) {
        appState.cabinetItems = appState.cabinetItems || [];
        appState.cabinetItems.unshift(item);
        renderCabinetGrid();
        saveState();
    }

    // 将家具放置到房间（数据层面）
    function placeFurnitureInRoom(item) {
        // 默认放置位置
        const placement = {
            id: 'placed_' + Date.now(), // 唯一实例 ID
            itemId: item.id,
            image: item.image,
            x: 50, // % left
            y: 80, // % top
            scale: 1,
            rotation: 0
        };
        appState.placedFurniture = appState.placedFurniture || [];
        appState.placedFurniture.push(placement);
        renderFurnitureLayer();
        saveState();
        
        // 切换到房间视图
        document.getElementById('btn-back-petroom').click(); 
    }

    // 渲染房间内的家具层
    function renderFurnitureLayer() {
        const container = document.getElementById('furniture-layer');
        container.innerHTML = '';
        const list = appState.placedFurniture || [];

        list.forEach(p => {
            const el = document.createElement('div');
            el.className = 'furniture-item furniture-pop';
            el.id = p.id;
            el.style.left = p.x + '%';
            el.style.top = p.y + '%';
            el.style.width = (80 * p.scale) + 'px'; // 基准宽度 80px
            
            const img = document.createElement('img');
            img.src = p.image;
            img.className = 'w-full h-auto drop-shadow-md pointer-events-none select-none';
            
            // 删除按钮（仅在选中/编辑时显示，这里简化为双击删除或长按菜单，暂略）
            
            el.appendChild(img);
            container.appendChild(el);

            // 初始化拖拽
            initDraggable(el, p);
        });
    }

    // 初始化拖拽逻辑 (Touch & Mouse)
    function initDraggable(el, data) {
        let isDragging = false;
        let startX, startY;
        let startLeft, startTop;
        const container = document.getElementById('room-viewport'); // 参考容器

        const onStart = (clientX, clientY) => {
            isDragging = true;
            el.classList.add('editing');
            startX = clientX;
            startY = clientY;
            
            // 获取当前百分比位置转换为像素，以便计算 delta
            const rect = el.getBoundingClientRect();
            const parentRect = container.getBoundingClientRect();
            startLeft = rect.left - parentRect.left;
            startTop = rect.top - parentRect.top;
            
            // 阻止事件冒泡，避免触发背景拖动
            // event.stopPropagation(); 
        };

        const onMove = (clientX, clientY) => {
            if (!isDragging) return;
            const deltaX = clientX - startX;
            const deltaY = clientY - startY;
            
            const parentRect = container.getBoundingClientRect();
            
            // 计算新位置（像素）
            let newLeft = startLeft + deltaX;
            let newTop = startTop + deltaY;
            
            // 转换为百分比
            let pctX = (newLeft / parentRect.width) * 100;
            let pctY = (newTop / parentRect.height) * 100;
            
            el.style.left = pctX + '%';
            el.style.top = pctY + '%';
            
            // 更新数据
            data.x = pctX;
            data.y = pctY;
        };

        const onEnd = () => {
            if (isDragging) {
                isDragging = false;
                el.classList.remove('editing');
                saveState(); // 拖拽结束保存
            }
        };

        // Mouse events
        el.addEventListener('mousedown', e => { onStart(e.clientX, e.clientY); e.stopPropagation(); });
        window.addEventListener('mousemove', e => { if(isDragging) { onMove(e.clientX, e.clientY); e.preventDefault(); } });
        window.addEventListener('mouseup', onEnd);

        // Touch events
        el.addEventListener('touchstart', e => { 
            if(e.touches.length === 1) {
                onStart(e.touches[0].clientX, e.touches[0].clientY); 
                e.stopPropagation();
            }
        }, { passive: false });
        
        window.addEventListener('touchmove', e => { 
            if(isDragging && e.touches.length === 1) {
                onMove(e.touches[0].clientX, e.touches[0].clientY); 
                e.preventDefault(); // 阻止滚动
            }
        }, { passive: false });
        
        window.addEventListener('touchend', onEnd);
    }


    // 初始化入口
    renderFurnitureLayer(); // 渲染已摆放家具
    renderCabinetGrid();
    renderMemoryWall();
    setupDiaryImageHandlers();
    initOwnerTitleControls();
</script>
